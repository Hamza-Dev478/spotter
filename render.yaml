# Render blueprint: Django API + free Postgres.
# Create from the Render dashboard → "New +" → "Blueprint" and point at this repo.
services:
  - type: web
    name: eld-trip-planner-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn config.wsgi:application"
    healthCheckPath: /api/v1/health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      # Set this to your Vercel URL after the frontend is deployed (any
      # *.vercel.app origin is also allowed automatically).
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-app.vercel.app,http://localhost:5173"
      - key: NOMINATIM_USER_AGENT
        value: "eld-trip-planner/1.0 (render)"
      - key: DATABASE_URL
        fromDatabase:
          name: eld-db
          property: connectionString

databases:
  - name: eld-db
    plan: free
